<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Пока ничего нет.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Fira+Mono:wght@500&display=swap"
      rel="stylesheet"
    >
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=block"
      rel="stylesheet"
    >
    <link rel="stylesheet" href="./src/style.css">
    <title>tecxz5</title>
  </head>
  <body>
    <header class="site-header" id="site-header">
      <a
        class="site-header__logo"
        href="#top"
        aria-expanded="false"
        aria-controls="site-navigation"
        aria-label="tecxz5"
      >tecxz5</a>
      <nav class="site-header__nav" id="site-navigation" aria-label="Навигация">
        <a href="#about">обо мне</a>
        <a href="#services">услуги</a>
        <a href="#portfolio">портфолио</a>
        <a href="#links">ссылки</a>
      </nav>
    </header>
    <div class="site-header-hover-zone" id="site-header-hover-zone" aria-hidden="true"></div>
    <main>
      <section class="empty-page" id="top">
        <canvas class="scribble-bg" id="scribble-bg" aria-hidden="true"></canvas>
        <p>что-то да есть, ахуй</p>
      </section>
      <section class="presentation-stage" id="presentation">
        <div class="presentation-sticky">
          <div class="presentation-track" id="presentation-track">
            <canvas class="symbols-bg" id="symbols-bg" aria-hidden="true"></canvas>
            <section class="presentation-slide" id="about">
              <h2>О себе</h2>
              <p>потом распишу</p>
            </section>
            <section class="presentation-slide" id="services">
              <h2>Услуги</h2>
              <div class="service-grid">
                <article><h3>Бот</h3><p>не расскажу</p></article>
                <article><h3>Сайт</h3><p>не расскажу</p></article>
                <article><h3>Плагин</h3><p>не расскажу</p></article>
              </div>
            </section>
            <section class="presentation-slide" id="portfolio">
              <h2>Портфолио</h2>
              <div class="portfolio-placeholders">
                <div></div>
                <div></div>
              </div>
            </section>
          </div>
        </div>
      </section>
      <footer class="site-footer" id="links">
        <div class="site-footer__panel">
          <img
            class="site-footer__copyright"
            src="./src/assets/images/Group 1.svg"
            alt="Copyright"
          >
          <div class="site-footer__links" aria-label="Ссылки">
            <img src="./src/assets/images/Group 4.svg" alt="Telegram">
            <img src="./src/assets/images/Group 3.svg" alt="GitHub">
          </div>
        </div>
      </footer>
    </main>
    <div class="loader" id="loader" aria-label="Загрузка">
      <section class="loader__section loader__section--top" aria-hidden="true"></section>
      <section class="loader__section loader__section--middle">
        <span class="loader__brand" data-text="tecxz5">tecxz5</span>
      </section>
      <section class="loader__section loader__section--bottom" aria-hidden="true"></section>
    </div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
